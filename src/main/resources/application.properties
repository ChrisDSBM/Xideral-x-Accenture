# MySQL datasource
# Cambiado de 3306 a 3307 para coincidir con tu contenedor Docker
spring.datasource.url=jdbc:mysql://localhost:3307/academia?useSSL=false&serverTimezone=UTC
spring.datasource.username=alumno
spring.datasource.password=alumno123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize Spring Batch schema always (create/clean tables each startup)
spring.batch.initialize-schema=always
spring.batch.jdbc.initialize-schema=always

# Run the job(s) on startup
spring.batch.job.enabled=false

# MongoDB connection
spring.data.mongodb.uri=mongodb://root:root123@localhost:27018/academia?authSource=admin

# Optional: reduce noisy logs
logging.level.org.springframework=INFO

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
